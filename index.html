<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolita Live TV Replica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; flex-direction: column; }

        /* AREA VIDEO (Kiri di Desktop) */
        .video-section { flex: 1; background: #000; display: flex; flex-direction: column; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* SIDEBAR (Kanan di Desktop) */
        .sidebar { 
            flex: 0 0 350px; 
            background: #0a0a0a; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #222;
        }

        /* Navigasi Header Sidebar */
        .sidebar-header { padding: 15px; background: #111; border-bottom: 1px solid #222; }
        .sidebar-header h2 { color: #fbbf24; font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; letter-spacing: -0.5px; }
        
        input, select { 
            width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; 
            border-radius: 4px; color: #fff; font-size: 13px; margin-bottom: 8px; outline: none;
        }
        input:focus, select:focus { border-color: #fbbf24; }

        /* Daftar Channel */
        .channel-container { flex: 1; overflow-y: auto; padding: 5px; }
        .channel-item { 
            width: 100%; display: flex; align-items: center; padding: 12px 15px; 
            margin-bottom: 2px; background: transparent; transition: 0.2s; 
            border-bottom: 1px solid #111; text-align: left;
        }
        .channel-item:focus, .channel-item:hover { background: #1a1a1a; outline: none; border-left: 4px solid #fbbf24; }
        
        .ch-number { color: #fbbf24; font-weight: bold; margin-right: 15px; min-width: 30px; font-size: 14px; }
        .ch-info { flex: 1; overflow: hidden; }
        .ch-name { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-group { display: block; font-size: 10px; color: #666; text-transform: uppercase; }

        /* Info Bar di bawah Video */
        .info-bar { padding: 15px; background: linear-gradient(to right, #0a0a0a, #000); border-top: 1px solid #222; }

        /* Responsivitas untuk Mobile (Tumpuk Vertikal) */
        @media (max-width: 767px) {
            .app-container { flex-direction: column; }
            .sidebar { flex: 1; width: 100%; border-left: none; border-top: 1px solid #222; }
            .video-section { flex: 0 0 30vh; }
        }
        
        /* Layout Desktop (Mirip livetv.coolita.com) */
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="video-section">
        <video id="main-video" controls autoplay playsinline></video>
        <div class="info-bar">
            <h1 id="now-playing-title" class="text-xl font-bold text-white">Selamat Datang</h1>
            <p id="now-playing-info" class="text-xs text-gray-500 uppercase tracking-widest">Pilih Channel di Menu Sebelah Kanan</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>LIVE TV <span class="font-light text-white italic">OS</span></h2>
            <select id="group-filter" onchange="filterList()">
                <option value="all">SEMUA KATEGORI</option>
            </select>
            <input id="search-box" type="text" placeholder="Cari Nama Channel..." onkeyup="filterList()">
        </div>

        <div id="channel-list" class="channel-container">
            <div class="p-10 text-center text-gray-700 text-sm italic">Memuat Siaran...</div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('main-video');
    const listContainer = document.getElementById('channel-list');
    const searchBox = document.getElementById('search-box');
    const groupFilter = document.getElementById('group-filter');
    const playingTitle = document.getElementById('now-playing-title');
    const playingInfo = document.getElementById('now-playing-info');

    const sources = [
        "https://iptv-org.github.io/iptv/languages/ind.m3u",
        "https://iptv-org.github.io/iptv/languages/jpn.m3u",
        "https://iptv-org.github.io/iptv/index.category.m3u"
    ];

    let allChannels = [];
    let hls = new Hls();

    window.onload = async () => {
        for (const url of sources) {
            try {
                const res = await fetch(url);
                const data = await res.text();
                const parsed = parseM3U(data);
                allChannels = [...allChannels, ...parsed];
                updateGroups();
                renderChannels(allChannels);
            } catch (e) { console.error("Gagal muat sumber."); }
        }
    };

    function parseM3U(text) {
        const lines = text.split(/\r?\n/);
        const channels = [];
        let current = {};
        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith("#EXTINF:")) {
                const name = line.split(',').pop();
                const groupMatch = line.match(/group-title="([^"]+)"/);
                current = { name, group: groupMatch ? groupMatch[1] : "LAINNYA" };
            } else if (line.startsWith("http")) {
                channels.push({ ...current, url: line });
            }
        });
        return channels;
    }

    function updateGroups() {
        const groups = [...new Set(allChannels.map(c => c.group))].sort();
        const current = groupFilter.value;
        groupFilter.innerHTML = '<option value="all">SEMUA KATEGORI</option>';
        groups.forEach(g => {
            const opt = document.createElement('option');
            opt.value = g; opt.innerText = g;
            groupFilter.appendChild(opt);
        });
        groupFilter.value = current;
    }

    function renderChannels(channels) {
        listContainer.innerHTML = "";
        channels.forEach((ch, index) => {
            const btn = document.createElement('button');
            btn.className = "channel-item";
            btn.innerHTML = `
                <div class="ch-number">${String(index + 1).padStart(2, '0')}</div>
                <div class="ch-info">
                    <span class="ch-name">${ch.name}</span>
                    <span class="ch-group">${ch.group}</span>
                </div>
            `;
            btn.onclick = () => playStream(ch.url, ch.name, ch.group);
            listContainer.appendChild(btn);
        });
    }

    function filterList() {
        const query = searchBox.value.toLowerCase();
        const group = groupFilter.value;
        const filtered = allChannels.filter(ch => {
            const mName = ch.name.toLowerCase().includes(query);
            const mGroup = group === "all" || ch.group === group;
            return mName && mGroup;
        });
        renderChannels(filtered);
    }

    function playStream(url, title, group) {
        playingTitle.innerText = title;
        playingInfo.innerText = "Kategori: " + group;
        
        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }
</script>
</body>
</html>
