<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolita IPTV - Grouping Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        .app-container { display: flex; height: 100vh; width: 100vw; flex-direction: column; }
        .video-box { flex: 0 0 40%; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .content-box { flex: 1; display: flex; flex-direction: column; background: #111; overflow: hidden; }
        
        .controls { padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; border-radius: 5px; color: #fff; font-size: 13px; outline: none; margin-bottom: 8px; }
        select { cursor: pointer; color: #fbbf24; font-weight: bold; }
        
        .channel-list { flex: 1; overflow-y: auto; padding: 5px; }
        .ch-btn { width: 100%; text-align: left; padding: 15px; margin-bottom: 2px; background: #181818; border-radius: 5px; font-size: 14px; border: 2px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .ch-btn:focus { border-color: #fbbf24; background: #222; outline: none; }
        .ch-group-tag { font-size: 9px; color: #666; text-transform: uppercase; border: 1px solid #333; padding: 2px 5px; border-radius: 3px; }

        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .video-box { flex: 1; height: 100vh; order: 2; }
            .content-box { width: 380px; height: 100vh; order: 1; border-right: 1px solid #333; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="video-box">
        <video id="video-player" controls autoplay playsinline></video>
    </div>
    <div class="content-box">
        <div class="controls">
            <h2 class="text-xs text-gray-500 mb-2 font-bold uppercase tracking-widest">Navigation</h2>
            <select id="group-select" onchange="filterChannels()">
                <option value="all">-- SEMUA KELOMPOK --</option>
            </select>
            <input id="search-input" type="text" placeholder="🔍 Cari Nama Channel..." onkeyup="filterChannels()">
            
            <div id="status" class="text-[10px] text-yellow-500 italic">Memulai...</div>
        </div>
        
        <div id="list-container" class="channel-list"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video-player');
    const listContainer = document.getElementById('list-container');
    const searchInput = document.getElementById('search-input');
    const groupSelect = document.getElementById('group-select');
    const status = document.getElementById('status');
    
    const sources = [
        "https://iptv-org.github.io/iptv/languages/ind.m3u",
        "https://iptv-org.github.io/iptv/languages/jpn.m3u",
        "https://iptv-org.github.io/iptv/index.category.m3u"
    ];

    let allChannels = [];
    let allGroups = new Set();
    let hls = new Hls();

    window.onload = loadAllSources;

    async function loadAllSources() {
        status.innerText = "Mengambil data playlist...";
        for (const url of sources) {
            try {
                const res = await fetch(url);
                const data = await res.text();
                const parsed = parseM3U(data);
                allChannels = [...allChannels, ...parsed];
