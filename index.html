<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Coolita - Fixed Scroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        /* Mengunci layar utama agar tidak ada scroll body */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
        }

        .app-container { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            flex-direction: column; 
        }

        /* Area Video Tetap di Atas (Mobile) atau Kanan (TV) */
        .video-box { 
            flex: 0 0 35%; 
            background: #000; 
            display: flex; 
            flex-direction: column;
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Area Navigasi & List */
        .content-box { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #111; 
            overflow: hidden; /* Penting: Mengunci container utama */
        }

        /* Header Statis (Search & Group) - Tidak Ikut Scroll */
        .header-controls { 
            padding: 10px; 
            background: #1a1a1a; 
            border-bottom: 2px solid #333;
            z-index: 10;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            background: #000; 
            border: 2px solid #444; 
            border-radius: 8px; 
            color: #fff; 
            font-size: 14px; 
            margin-bottom: 8px; 
            outline: none;
        }
        
        /* Highlight saat Remote TV memilih input */
        input:focus, select:focus { border-color: #fbbf24; background: #222; }

        /* AREA SCROLL KHUSUS DAFTAR CHANNEL */
        .scrollable-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px;
            -webkit-overflow-scrolling: touch; /* Halus di mobile */
        }

        .ch-btn { 
            width: 100%; 
            text-align: left; 
            padding: 15px; 
            margin-bottom: 6px; 
            background: #1a1a1a; 
            border-radius: 8px; 
            font-size: 14px; 
            border: 2px solid transparent; 
            display: flex; 
            justify-content: space-between;
        }

        /* Efek fokus remote TV agar bisa scroll ke atas/bawah otomatis */
        .ch-btn:focus { 
            border-color: #fbbf24; 
            background: #333; 
            outline: none; 
            transform: scale(1.01);
        }

        .ch-tag { font-size: 9px; color: #fbbf24; border: 1px solid #444; padding: 2px 6px; border-radius: 4px; }

        /* Layout TV (Layar Lebar) */
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .video-box { flex: 1; height: 100vh; order: 2; }
            .content-box { width: 380px; height: 100vh; order: 1; border-right: 2px solid #333; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="video-box">
        <video id="video-player" controls autoplay playsinline></video>
        <div id="playing-info" class="p-2 text-[10px] bg-zinc-900 truncate italic text-gray-400">Pilih siaran...</div>
    </div>

    <div class="content-box">
        <div class="header-controls">
            <select id="group-select" onchange="filterChannels()">
                <option value="all">-- SEMUA KATEGORI --</option>
            </select>
            <input id="search-input" type="text" placeholder="🔍 Cari Nama Channel..." onkeyup="filterChannels()">
        </div>
        
        <div id="list-container" class="scrollable-list">
            <div class="p-10 text-center text-gray-600 italic text-sm">Memuat channel...</div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video-player');
    const listContainer = document.getElementById('list-container');
    const searchInput = document.getElementById('search-input');
    const groupSelect = document.getElementById('group-select');
    const info = document.getElementById('playing-info');
    
    const sources = [
        "https://iptv-org.github.io/iptv/languages/ind.m3u",
        "https://iptv-org.github.io/iptv/languages/jpn.m3u",
        "https://iptv-org.github.io/iptv/index.category.m3u"
    ];

    let allChannels = [];
    let allGroups = new Set();
    let hls = new Hls();

    window.onload = loadAllSources;

    async function loadAllSources() {
        for (const url of sources) {
            try {
                const res = await fetch(url);
                const data = await res.text();
                const parsed = parseM3U(data);
                allChannels = [...allChannels, ...parsed];
                renderGroups();
                renderChannels(allChannels);
            } catch (e) { console.error("Gagal load: " + url); }
        }
    }

    function parseM3U(text) {
        const lines = text.split(/\r?\n/);
        const channels = [];
        let currentInfo = {};

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith("#EXTINF:")) {
                const name = line.split(',').pop();
                const groupMatch = line.match(/group-title="([^"]+)"/);
                const group = groupMatch ? groupMatch[1] : "LAINNYA";
                currentInfo = { name, group };
                allGroups.add(group);
            } else if (line.startsWith("http")) {
                channels.push({ ...currentInfo, url: line });
                currentInfo = {};
            }
        });
        return channels;
    }

    function renderGroups() {
        const currentSelection = groupSelect.value;
        const sortedGroups = Array.from(allGroups).sort();
        groupSelect.innerHTML = '<option value="all">-- SEMUA KATEGORI --</option>';
        sortedGroups.forEach(group => {
            const opt = document.createElement('option');
            opt.value = group;
            opt.innerText = group;
            groupSelect.appendChild(opt);
        });
        groupSelect.value = currentSelection;
    }

    function renderChannels(channels) {
        listContainer.innerHTML = "";
        channels.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = "ch-btn";
            btn.innerHTML = `<span>${ch.name}</span><span class="ch-tag">${ch.group}</span>`;
            btn.onclick = () => playStream(ch.url, ch.name);
            listContainer.appendChild(btn);
        });
    }

    function filterChannels() {
        const query = searchInput.value.toLowerCase();
        const selectedGroup = groupSelect.value;

        const filtered = allChannels.filter(ch => {
            const matchName = ch.name.toLowerCase().includes(query);
            const matchGroup = selectedGroup === "all" || ch.group === selectedGroup;
            return matchName && matchGroup;
        });
        renderChannels(filtered);
    }

    function playStream(url, title) {
        info.innerText = "📺 Memutar: " + title;
        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                // Scroll otomatis ke atas agar video terlihat di mobile saat diklik
                if(window.innerWidth < 768) window.scrollTo({top: 0, behavior: 'smooth'});
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }
</script>
</body>
</html>
