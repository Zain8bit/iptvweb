<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolita IPTV Player - TV Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; height: 100vh; overflow: hidden; }
        /* Layout khusus TV: Kiri Daftar, Kanan Video */
        .wrapper { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 300px; background: #111; display: flex; flex-direction: column; border-right: 2px solid #222; }
        .player-area { flex: 1; background: #000; display: flex; flex-direction: column; }
        
        video { width: 100%; height: 70%; background: #000; }
        .channel-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        
        /* Gaya Tombol Daftar Channel */
        .ch-item { 
            width: 100%; text-align: left; padding: 12px; margin-bottom: 5px;
            background: #1a1a1a; border: 2px solid transparent; border-radius: 5px;
            font-size: 14px; cursor: pointer;
        }
        .ch-item:focus { border-color: #fbbf24; background: #333; outline: none; }
        
        /* Form Input di Atas Sidebar */
        .input-box { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
        input { width: 100%; padding: 8px; background: #000; border: 1px solid #444; border-radius: 4px; color: #fff; font-size: 12px; margin-bottom: 8px; }
        .btn-load { width: 100%; background: #fbbf24; color: #000; font-weight: bold; padding: 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <div class="input-box">
            <h2 class="text-yellow-500 font-bold mb-2">COOLITA WEB TV</h2>
            <input id="url-m3u" type="text" placeholder="Masukkan Link M3U di sini...">
            <button onclick="muatPlaylist()" class="btn-load">MUAT CHANNEL</button>
        </div>
        <div id="list-container" class="channel-list">
            <p class="text-gray-500 text-center mt-5 text-sm">Belum ada channel.</p>
        </div>
    </div>

    <div class="player-area">
        <video id="video" controls autoplay></video>
        <div class="p-5">
            <h1 id="judul" class="text-2xl font-bold text-yellow-500">Pilih Channel</h1>
            <p id="sub-judul" class="text-gray-400">Silahkan masukkan link M3U di menu samping.</p>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const hls = new Hls();

    async function muatPlaylist() {
        const url = document.getElementById('url-m3u').value;
        if (!url) return alert("Masukkan link dulu!");

        try {
            const res = await fetch(url);
            const text = await res.text();
            prosesM3U(text);
        } catch (e) {
            alert("Gagal ambil data. Cek koneksi atau link kamu.");
        }
    }

    function prosesM3U(data) {
        const baris = data.split(/\r?\n/);
        const wadah = document.getElementById('list-container');
        wadah.innerHTML = "";
        
        let namaSekarang = "";
        baris.forEach(l => {
            l = l.trim();
            if (l.startsWith("#EXTINF:")) {
                namaSekarang = l.split(',').pop();
            } else if (l.startsWith("http")) {
                const link = l;
                const nama = namaSekarang || "Channel Tanpa Nama";
                
                const btn = document.createElement('button');
                btn.className = "ch-item";
                btn.innerText = nama;
                btn.onclick = () => putar(link, nama);
                wadah.appendChild(btn);
                namaSekarang = "";
            }
        });
    }

    function putar(url, judul) {
        document.getElementById('judul').innerText = judul;
        document.getElementById('sub-judul').innerText = url;

        if (Hls.isSupported()) {
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }
</script>

</body>
</html>
