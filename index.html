<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolita IPTV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <style>
        /* Mencegah scroll seluruh halaman agar tidak "jauh" */
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; flex-direction: column; }
        
        /* Area Video */
        .video-box { flex: 0 0 40%; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Area Kontrol & List */
        .content-box { flex: 1; display: flex; flex-direction: column; background: #111; overflow: hidden; }
        
        /* Input Bar Statis (Pengganti Tombol +) */
        .input-bar { padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #000; border: 1px solid #444; border-radius: 5px; color: #fff; font-size: 13px; outline: none; }
        .btn-go { background: #fbbf24; color: #000; font-weight: bold; padding: 10px 15px; border-radius: 5px; cursor: pointer; }

        /* List Channel dengan Scroll Sendiri */
        .channel-list { flex: 1; overflow-y: auto; padding: 5px; }
        .ch-btn { 
            width: 100%; text-align: left; padding: 15px; margin-bottom: 2px;
            background: #181818; border-radius: 5px; font-size: 14px; border: 2px solid transparent;
        }
        .ch-btn:focus { border-color: #fbbf24; background: #222; outline: none; }

        /* Tampilan Desktop/TV (Layar Lebar) */
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .video-box { flex: 1; height: 100vh; order: 2; }
            .content-box { width: 350px; height: 100vh; order: 1; border-right: 1px solid #333; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="video-box">
        <video id="video-player" controls autoplay playsinline></video>
        <div id="loading-overlay" class="absolute inset-0 bg-black/50 flex items-center justify-center hidden">
            <span class="text-sm">Buffering...</span>
        </div>
    </div>

    <div class="content-box">
        <div class="input-bar">
            <input id="m3u-input" type="text" placeholder="Tempel Link M3U Baru...">
            <button onclick="loadManual()" class="btn-go text-xs">LOAD</button>
        </div>
        
        <div id="status" class="text-[10px] text-center py-1 text-gray-500 bg-black">Memuat IPTV-org...</div>

        <div id="list-container" class="channel-list">
            </div>
    </div>
</div>

<script>
    const video = document.getElementById('video-player');
    const listContainer = document.getElementById('list-container');
    const status = document.getElementById('status');
    const defaultM3U = "https://iptv-org.github.io/iptv/index.m3u";
    let hls = new Hls();

    // Auto-load saat buka web
    window.onload = () => fetchM3U(defaultM3U);

    function loadManual() {
        const url = document.getElementById('m3u-input').value;
        if(url) fetchM3U(url);
    }

    async function fetchM3U(url) {
        status.innerText = "Mengambil data dari server...";
        try {
            const res = await fetch(url);
            const data = await res.text();
            parseM3U(data);
            status.innerText = "Berhasil: Silahkan pilih channel";
        } catch (e) {
            status.innerText = "Gagal: Masalah koneksi atau CORS browser TV";
        }
    }

    function parseM3U(text) {
        const lines = text.split(/\r?\n/);
        listContainer.innerHTML = "";
        let currentTitle = "";

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith("#EXTINF:")) {
                currentTitle = line.split(',').pop();
            } else if (line.startsWith("http")) {
                const name = currentTitle || "Unnamed Channel";
                const link = line;
                
                const btn = document.createElement('button');
                btn.className = "ch-btn";
                btn.innerText = name;
                btn.onclick = () => playStream(link, name);
                listContainer.appendChild(btn);
                currentTitle = "";
            }
        });
    }

    function playStream(url, title) {
        console.log("Memutar:", title);
        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }
</script>

</body>
</html>
